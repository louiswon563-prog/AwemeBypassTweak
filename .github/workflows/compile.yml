name: Build AwemeBypass Tweak (Fixed)

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Install Theos
      run: |
        git clone --depth=1 https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV
        
    - name: Install substitute from source
      run: |
        git clone --depth=1 https://github.com/comex/substitute.git
        cd substitute
        ./configure --prefix=/usr/local
        make
        sudo make install
        
    - name: Build tweak
      run: |
        export THEOS=~/theos
        export PATH=$THEOS/bin:$PATH
        cd ${{ github.workspace }}
        make clean 2>/dev/null || true
        make package
        
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: AwemeBypass-DEB
        path: |
          packages/*.deb
          .theos/_/debs/*.deb
        if-no-files-found: warn
