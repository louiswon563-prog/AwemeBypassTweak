name: Build AwemeBypass Tweak

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Theos & Dependencies
      run: |
        brew install ldid
        git clone --depth 1 https://github.com/theos/theos.git ~/theos
        echo "THEOS=~/theos" >> $GITHUB_ENV
        echo "~/theos/bin" >> $GITHUB_PATH
        # 下载 iOS SDK
        mkdir -p ~/theos/sdks
        curl -L https://github.com/theos/sdks/archive/refs/heads/master.tar.gz | tar -xz -C ~/theos/sdks --strip-components=1

    - name: Build Package
      run: |
        make clean
        make package

    - name: Upload Deb
      uses: actions/upload-artifact@v4
      with:
        name: AwemeBypass
        path: packages/*.deb
